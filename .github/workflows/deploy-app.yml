name: 'Deploy - HelloWorld App to Azure Web App'

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: tidal-example-web-app-prod
  PACKAGE_PATH: app/HelloWorld/HelloWorld/bin/publishHelloWorld.zip

jobs:
  deploy:
    name: 'Deploy to Azure Web App'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_AD_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_AD_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_AD_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            }

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ${{ env.PACKAGE_PATH }}

      - name: Azure Logout
        if: always()
        run: az logout
